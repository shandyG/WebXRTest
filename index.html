<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quest 3 WebXR - White Cube</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
    }

    #ui {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      color: white;
    }

    button {
      font-size: 16px;
      padding: 10px 14px;
    }
  </style>
</head>
<body>

  <div id="ui">
    <div>Quest 3 WebXR 白キューブ</div>
    <button id="enter">Enter VR</button>
  </div>

  <!-- JSを外部ファイルとして読み込む -->
  <script type="module" src="./main.js"></script>

</body>
</html>
